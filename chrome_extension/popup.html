<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 420px;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    font-size: 13px;
    background: #1e1e2e;
    color: #cdd6f4;
  }

  .header {
    padding: 12px 16px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #313244;
  }
  .header h1 { font-size: 15px; font-weight: 600; }
  .header .ver { font-size: 11px; color: #6c7086; }

  .status-bar {
    padding: 6px 16px;
    font-size: 12px;
    background: #181825;
    display: flex;
    gap: 12px;
  }
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
  .dot.green { background: #a6e3a1; }
  .dot.red { background: #f38ba8; }
  .dot.yellow { background: #f9e2af; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.4; } }

  .section {
    padding: 10px 16px;
  }
  .section label {
    display: block;
    font-size: 11px;
    color: #a6adc8;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  select {
    width: 100%;
    padding: 8px 10px;
    background: #313244;
    color: #cdd6f4;
    border: 1px solid #45475a;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: #89b4fa; }
  optgroup { color: #a6adc8; font-style: normal; }
  option { color: #cdd6f4; background: #313244; }

  .buttons {
    padding: 8px 16px;
    display: flex;
    gap: 6px;
  }
  button {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-start { background: #89b4fa; color: #1e1e2e; }
  .btn-start:hover { background: #74c7ec; }
  .btn-start.running { background: #f38ba8; }
  .btn-start.running:hover { background: #eba0ac; }
  .btn-status { background: #313244; color: #cdd6f4; }
  .btn-status:hover { background: #45475a; }
  .btn-dl { background: #313244; color: #a6e3a1; }
  .btn-dl:hover { background: #45475a; }
  .btn-reset { background: #313244; color: #f38ba8; }
  .btn-reset:hover { background: #45475a; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .logs {
    margin: 0 16px 12px;
    height: 240px;
    background: #11111b;
    border-radius: 6px;
    overflow-y: auto;
    padding: 8px;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 11px;
    line-height: 1.5;
  }
  .logs::-webkit-scrollbar { width: 6px; }
  .logs::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }
  .log-line { word-break: break-all; }
  .log-line.error { color: #f38ba8; }
  .log-line.log { color: #a6adc8; }

  .note {
    padding: 4px 16px 10px;
    font-size: 11px;
    color: #585b70;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <h1>KB Life Scraper</h1>
  <span class="ver">v2.0</span>
</div>

<div class="status-bar">
  <span id="ajaxStatus"><span class="dot red"></span>ajax 없음</span>
  <span id="runStatus"></span>
</div>

<div class="section">
  <label>상품 선택</label>
  <select id="product">
    <optgroup label="3N5 계열">
      <option value="3n5_all|scrape_3n5_all||3N5 전체">3N5 전체 (16개 연속)</option>
      <option value="334000104|scrape_3n5||3N5_간편335_표준형">3N5_간편335_표준형</option>
      <option value="344000104|scrape_3n5||3N5_간편335_표준형_납입면제">3N5_간편335_표준형_납입면제</option>
      <option value="333000104|scrape_3n5||3N5_간편335_미지급형">3N5_간편335_미지급형</option>
      <option value="343000104|scrape_3n5||3N5_간편335_미지급형_납입면제">3N5_간편335_미지급형_납입면제</option>
      <option value="332000104|scrape_3n5||3N5_간편355_표준형">3N5_간편355_표준형</option>
      <option value="342000104|scrape_3n5||3N5_간편355_표준형_납입면제">3N5_간편355_표준형_납입면제</option>
      <option value="331000104|scrape_3n5||3N5_간편355_미지급형">3N5_간편355_미지급형</option>
      <option value="341000104|scrape_3n5||3N5_간편355_미지급형_납입면제">3N5_간편355_미지급형_납입면제</option>
      <option value="335200104|scrape_3n5||3N5_갱신_간편315_미지급형">3N5_갱신_간편315_미지급형</option>
      <option value="333200104|scrape_3n5||3N5_갱신_간편335_미지급형">3N5_갱신_간편335_미지급형</option>
      <option value="331200104|scrape_3n5||3N5_갱신_간편355_미지급형">3N5_갱신_간편355_미지급형</option>
      <option value="337200104|scrape_3n5||3N5_갱신_일반심사_미지급형">3N5_갱신_일반심사_미지급형</option>
      <option value="336000104|scrape_3n5||3N5_일반심사_표준형">3N5_일반심사_표준형</option>
      <option value="346000104|scrape_3n5||3N5_일반심사_표준형_납입면제">3N5_일반심사_표준형_납입면제</option>
      <option value="335000104|scrape_3n5||3N5_일반심사_미지급형">3N5_일반심사_미지급형</option>
      <option value="345000104|scrape_3n5||3N5_일반심사_미지급형_납입면제">3N5_일반심사_미지급형_납입면제</option>
    </optgroup>
    <optgroup label="기타 상품">
      <option value="314700102|scrape_term|term|착한정기보험II">착한정기보험II</option>
      <option value="337600104|scrape_health|health|e건강보험_일반심사">e건강보험_일반심사</option>
      <option value="331600104|scrape_health|health|e건강보험_간편심사355">e건강보험_간편심사355</option>
      <option value="316100104|scrape_universal|universal|착한암보험">착한암보험</option>
      <option value="118500105|scrape_annuity|annuity|하이파이브연금">하이파이브연금</option>
    </optgroup>
  </select>
</div>

<div class="buttons">
  <button id="startBtn" class="btn-start">시작</button>
  <button id="statusBtn" class="btn-status">상태</button>
  <button id="dlBtn" class="btn-dl">다운로드</button>
  <button id="resetBtn" class="btn-reset">초기화</button>
</div>

<div class="logs" id="logs"></div>

<div class="note">
  PC 사이트에서 보험료 계산 1회 수동 실행 후 사용
</div>

<script src="popup.js"></script>
</body>
</html>
